[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --strict-markers --import-mode=importlib
markers =
    unit: direct test of one callable assembly subroutine or host helper
    integration: one public call traversing multiple production subroutines
    functional: complete user-visible feature through a stable interface
    system: whole-build, linker, layout, artifact, or environment contract
    e2e: installed-system workflow from input submission to observable result
    smoke: stable fast subset of authoritative tests
    static: source or generated-artifact inspection without CPU execution
    local: executes in the local 6502 emulator
    georam: requires or validates geoRAM behavior
    vice: executes through VICE
    hardware: requires hardware-accurate VICE behavior
    basicv2: Commodore BASIC V2 compatibility profile
    basicv3: Compiler 2 BASIC V3 profile
    basicv35: BASIC V3.5 compatibility profile
    ieee: Compiler 2 IEEE extension profile
    immediate: READY/direct execution mode
    program: stored tokenized program execution mode
    compile: explicit compiled-artifact execution mode
    callable_coverage(name, executor): declared direct invocation of linked production bytes
    performance: benchmark source or measured performance acceptance test
