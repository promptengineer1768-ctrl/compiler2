      program: basicv2-program-FOR
      compile: basicv2-program-FOR
    source_by_mode:
      immediate:
        - "FOR I=1 TO 3:PRINT I:NEXT"
      program:
        - "10 FOR I=1 TO 3:PRINT I:NEXT"
      compile:
        - "10 FOR I=1 TO 3:PRINT I:NEXT"

  - id: g1-for-next-multiline
    group: group1
    profile: basicv2
