      compile: basicv2-program-FOR
    source_by_mode:
      program:
        - "10 FOR I=1 TO 3"
        - "20 PRINT I"
        - "30 NEXT"
      compile:
        - "10 FOR I=1 TO 3"
        - "20 PRINT I"
        - "30 NEXT"

