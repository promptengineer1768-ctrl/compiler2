# Keyword E2E matrix catalog.
# Groups prioritize implementation and oracle capture order.
# Modes: immediate | program | compile
# applicability: required | not_applicable | negative
# oracle: stock (VICE stock BASIC) | project (Compiler-2-only)
# product_status: implemented | not_implemented | blocked
#
# compile-mode oracles reuse stock *program* semantics (stock has no compile).

schema_version: "1.0"

groups:
  group1:
    description: >
      Numeric vars, assignment/expressions, LET, loops, string assignment,
      special vars TI/TI$/ST, PRINT, BASIC dialect commands.
    order: 1
  group2:
    description: >
      String vars/expressions, conversions, SGN/ABS/INT, REM, arrays,
      remaining non-trig/non-IEEE keywords.
    order: 2
  group3:
    description: >
      Trig, transcendental, IEEE/FPMODE, and remaining surface.
    order: 3

cases:
  # --- Group 1: PRINT (baseline) ---
  - id: g1-print-string
    group: group1
    profile: basicv2
    keyword: PRINT
    modes: [immediate, program, compile]
    applicability: required
    oracle: stock
    # Immediate product path verified. Program/compile entry still flaky under
    # paint+RETURN (numbered store); keep implemented for immediate matrix only
    # via product_status + mode filter in tests (see product_modes).
    product_status: implemented
    product_modes: [immediate, program, compile]
    fixture_id_by_mode:
      immediate: basicv2-immediate-PRINT
      program: basicv2-program-PRINT
      compile: basicv2-program-PRINT
    source_by_mode:
      immediate:
        - 'PRINT "OK"'
      program:
        - '10 PRINT "OK"'
      compile:
        - '10 PRINT "OK"'

  - id: g1-print-int
    group: group1
    profile: basicv2
    keyword: PRINT
    modes: [immediate, program, compile]
    applicability: required
    oracle: stock
    product_status: implemented
    product_modes: [immediate, program, compile]
    fixture_id_by_mode:
      immediate: basicv2-g1-immediate-PRINT-INT
      program: basicv2-g1-program-PRINT-INT
      compile: basicv2-g1-program-PRINT-INT
    source_by_mode:
      immediate:
        - "PRINT 42"
      program:
        - "10 PRINT 42"
      compile:
        - "10 PRINT 42"

  # --- Assignment / LET / expressions ---
  - id: g1-assign-print
    group: group1
    profile: basicv2
    keyword: LET
    modes: [immediate, program, compile]
    applicability: required
    oracle: stock
    product_status: implemented
    product_modes: [immediate, program, compile]
    fixture_id_by_mode:
      immediate: basicv2-g1-immediate-ASSIGN
      program: basicv2-program-LET
      compile: basicv2-program-LET
    source_by_mode:
      immediate:
        - "A=5"
        - "PRINT A"
      program:
        - "10 LET A=7"
        - "20 PRINT A"
      compile:
        - "10 LET A=7"
        - "20 PRINT A"

  - id: g1-bare-assign-expr
    group: group1
    profile: basicv2
    keyword: LET
    modes: [immediate, program, compile]
    applicability: required
    oracle: stock
    product_status: implemented
    product_modes: [immediate, program, compile]
    fixture_id_by_mode:
