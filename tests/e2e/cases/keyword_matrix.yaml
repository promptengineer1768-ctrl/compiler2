      program: basicv2-g1-program-ASSIGN-EXPR
      compile: basicv2-g1-program-ASSIGN-EXPR
    source_by_mode:
      immediate:
        - "A=3"
        - "B=A+2"
        - "PRINT B"
      program:
        - "10 A=3"
        - "20 B=A+2"
        - "30 PRINT B"
      compile:
        - "10 A=3"
        - "20 B=A+2"
        - "30 PRINT B"

  # --- FOR/NEXT ---
  # Immediate single-line FOR..NEXT needs same-line loop codegen (size-blocked
  # in RAM_HIGH). Multi-line program form uses for_continue + recompile.
  - id: g1-for-next
    group: group1
    profile: basicv2
    keyword: FOR
    modes: [immediate, program, compile]
    applicability: required
    oracle: stock
    product_status: not_implemented
    fixture_id_by_mode:
