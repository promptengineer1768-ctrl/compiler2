name: Backend consumer proof

on:
  workflow_dispatch:
    inputs:
      backend_repository:
        description: Published repository containing the pinned Backend revision
        required: true
        default: promptengineer1768-ctrl/backend
        type: string
  pull_request:

permissions:
  contents: read

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: compiler2
    env:
      BACKEND_REVISION: b6c5d2d3d6565ff0e9e0cc1aa26458e1d3197ee0
      BACKEND_REPOSITORY: ${{ inputs.backend_repository || 'promptengineer1768-ctrl/backend' }}
      COMPILER2_BACKEND_ROOT: ${{ github.workspace }}/backend
      CC65_REVISION: 555282497c3ecf8b313d87d5973093af19c35bd5
    steps:
      - name: Check out Compiler 2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          path: compiler2

      - name: Check out pinned Backend
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: ${{ env.BACKEND_REPOSITORY }}
          ref: ${{ env.BACKEND_REVISION }}
          path: backend
          token: ${{ secrets.BACKEND_READ_TOKEN }}

      - name: Check out pinned VICE Next harness
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: promptengineer1768-ctrl/vice-next-mcp
          ref: cc7c9c22c739326d5f6727c3b08300850a79b2c9
          path: tools/vice-next-mcp

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
          cache: pip

      - name: Install Python and pinned cc65 dependencies
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check jsonschema pyyaml pytest pytest-timeout pytest-xdist ruff black mypy
          python -m pip install --no-deps -e ../backend
          sudo apt-get update
          sudo apt-get install --yes build-essential xvfb libsdl2-dev libasound2-dev libpulse-dev libpng-dev zlib1g-dev libreadline-dev libglew-dev libevdev-dev
          git clone --filter=blob:none https://github.com/cc65/cc65.git ../cc65
          git -C ../cc65 checkout --detach $env:CC65_REVISION
          make -C ../cc65 -j2
          New-Item -ItemType Directory -Force ../tools | Out-Null
          Copy-Item ../cc65/bin/ca65 ../tools/ca65.exe
          Copy-Item ../cc65/bin/ld65 ../tools/ld65.exe
          & ../tools/ca65.exe --version
          & ../tools/ld65.exe --version

      - name: Install pinned instrumented VICE runtime
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP 'vice-3.10-instrumented-linux.tar.gz'
          curl --fail --location --output $archive 'https://github.com/promptengineer1768-ctrl/vice-instrumentation/releases/download/v3.10-instrumented-20260718-full.4/vice-3.10-instrumented-linux.tar.gz'
          $expected = '31eebade4c55bb4f9bda7ecb17f35f868c6c2cfceeea86b59ef777c2e25684a2'
          $actual = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { throw "VICE runtime digest mismatch: $actual" }
          $runtimeRoot = '../builds/vice-instrumentation-windows/extracted'
          New-Item -ItemType Directory -Force $runtimeRoot | Out-Null
          tar -xzf $archive -C $runtimeRoot
          $runtime = (Resolve-Path "$runtimeRoot/usr/local/bin").Path
          New-Item -ItemType SymbolicLink -Path "$runtime/x64sc.exe" -Target "$runtime/x64sc" | Out-Null
          New-Item -ItemType SymbolicLink -Path "$runtime/xplus4.exe" -Target "$runtime/xplus4" | Out-Null
          "VICE_NEXT_RUNTIME=$runtime" | Add-Content $env:GITHUB_ENV
          Start-Process Xvfb -ArgumentList ':99','-screen','0','1024x768x24' -RedirectStandardOutput /tmp/xvfb.log -RedirectStandardError /tmp/xvfb.err
          "DISPLAY=:99" | Add-Content $env:GITHUB_ENV
          "SDL_VIDEODRIVER=x11" | Add-Content $env:GITHUB_ENV
          "VICE_DATADIR=$((Resolve-Path "$runtimeRoot/usr/local/share/vice").Path)" | Add-Content $env:GITHUB_ENV
          & "$runtime/x64sc" -help | Select-Object -First 1
          if ($LASTEXITCODE -ne 0) { throw 'VICE Linux runtime preflight failed' }

      - name: Initialize machine-readable reports
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/test-reports | Out-Null
          $summary = [ordered]@{
            schema_version = 1
            backend_revision = $env:BACKEND_REVISION
            compiler2_commit = $env:GITHUB_SHA
            workflow_run = $env:GITHUB_RUN_ID
            status = 'started'
            junit = 'build/test-reports/system.xml'
          }
          $summary | ConvertTo-Json | Set-Content -Encoding utf8 build/test-reports/ci-summary.json

      - name: Validate pinned consumer contracts
        shell: pwsh
        run: |
          python tools/validate_build.py --manifests
          python tools/task_manifest.py validate

      - name: Build release artifacts
        shell: pwsh
        run: ./build.ps1 -ToolsRoot ../tools -Python (Get-Command python).Source -ExpansionPreference GeoRam -SkipViceBenchmarks

      - name: Run system and Backend-adoption tests
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/test-reports | Out-Null
          python -m pytest tests/system/test_backend_adoption.py tests/tools/test_validate_build.py -v --junitxml=build/test-reports/system.xml

      - name: Write machine-readable CI summary
        if: always()
        shell: pwsh
        env:
          CI_JOB_STATUS: ${{ job.status }}
        run: |
          $summary = [ordered]@{
            schema_version = 1
            backend_revision = $env:BACKEND_REVISION
            compiler2_commit = $env:GITHUB_SHA
            workflow_run = $env:GITHUB_RUN_ID
            status = $env:CI_JOB_STATUS
            junit = 'build/test-reports/system.xml'
          }
          $summary | ConvertTo-Json | Set-Content -Encoding utf8 build/test-reports/ci-summary.json

      - name: Assemble readiness distribution
        shell: pwsh
        run: backend-framework package-distribution manifests/backend/distribution-profile.json

      - name: Upload binaries and disks
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: compiler2-binaries
          if-no-files-found: error
          path: |
            compiler2/build/*.prg
            compiler2/build/*.bin
            compiler2/build/*.d64
            compiler2/build/*manifest.json

      - name: Upload manuals and generated references
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: compiler2-documentation
          if-no-files-found: error
          path: |
            compiler2/docs/*.md
            compiler2/build/API.md
            compiler2/build/MAP.md

      - name: Upload distribution assets
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: compiler2-distribution
          if-no-files-found: error
          path: compiler2/build/distribution/**

      - name: Upload machine-readable test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: compiler2-test-reports
          if-no-files-found: error
          path: compiler2/build/test-reports/**
